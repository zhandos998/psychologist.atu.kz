x-app-env: &app-env
  APP_NAME: ${APP_NAME:-ATU Psychology}
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${APP_KEY:?APP_KEY is required}
  APP_URL: ${APP_URL:-https://psychologist.atu.kz}
  APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Qyzylorda}
  APP_LOCALE: ${APP_LOCALE:-ru}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-ru}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-warning}
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: ${DOCKER_DB_DATABASE:-psychologist_atu}
  DB_USERNAME: ${DOCKER_DB_USERNAME:-psychologist_atu}
  DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
  CACHE_STORE: ${CACHE_STORE:-database}
  SESSION_DRIVER: ${SESSION_DRIVER:-database}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  SESSION_ENCRYPT: ${SESSION_ENCRYPT:-true}
  SESSION_DOMAIN: ${SESSION_DOMAIN:-psychologist.atu.kz}
  SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
  SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-mailpit}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@atu.kz}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ATU Psychology}
  SPP_API_TOKEN: ${SPP_API_TOKEN:?SPP_API_TOKEN is required}
  SPP_API_ROLE: ${SPP_API_ROLE:-admin}

services:
  app:
    build:
      context: .
      target: app
      args:
        PHP_BASE_IMAGE: ${PHP_BASE_IMAGE:-student-profile-app:latest}
    image: psychologist-atu-app:latest
    restart: unless-stopped
    environment:
      <<: *app-env
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  queue:
    image: psychologist-atu-app:latest
    build:
      context: .
      target: app
      args:
        PHP_BASE_IMAGE: ${PHP_BASE_IMAGE:-student-profile-app:latest}
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=120"]
    environment:
      <<: *app-env
      RUN_OPTIMIZE: "false"
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

  nginx:
    build:
      context: .
      target: nginx
      args:
        PHP_BASE_IMAGE: ${PHP_BASE_IMAGE:-student-profile-app:latest}
    image: psychologist-atu-nginx:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-127.0.0.1:8113}:80"
    volumes:
      - storage_data:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_started

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DOCKER_DB_DATABASE:-psychologist_atu}
      MYSQL_USER: ${DOCKER_DB_USERNAME:-psychologist_atu}
      MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      PMA_ABSOLUTE_URI: ${PHPMYADMIN_ABSOLUTE_URI:-https://psychologist.atu.kz/phpmyadmin/}
      UPLOAD_LIMIT: 64M
    ports:
      - "${PHPMYADMIN_PORT:-127.0.0.1:8114}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  storage_data:
